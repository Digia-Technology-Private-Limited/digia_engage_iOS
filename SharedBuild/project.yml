# xcodegen spec for the "shared-deps" DigiaEngage build (CocoaPods-driven).
#
# Defines ONLY the DigiaEngage dynamic framework target (source). The deps
# (Lottie / SDWebImageSwiftUI / SDWebImageSVGCoder) are provided at build time
# by CocoaPods from their SOURCE pods (see SharedBuild/Podfile) as DYNAMIC
# frameworks. DigiaEngage links against them but does NOT embed them, so the
# shipped DigiaEngage.xcframework is slim and the consumer supplies the deps
# (declared via s.dependency) -> host app + DigiaEngage share one copy.
#
# Flow: xcodegen generate -> pod install -> xcodebuild archive (workspace).

name: DigiaEngageShared
options:
  bundleIdPrefix: tech.digia
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    BUILD_LIBRARY_FOR_DISTRIBUTION: YES

targets:
  DigiaEngage:
    type: framework
    platform: iOS
    sources:
      - path: ../Sources/DigiaEngage
    settings:
      base:
        PRODUCT_NAME: DigiaEngage
        PRODUCT_BUNDLE_IDENTIFIER: tech.digia.DigiaEngage
        DEFINES_MODULE: YES
        MACH_O_TYPE: mh_dylib
        SKIP_INSTALL: NO
        CODE_SIGNING_ALLOWED: NO
